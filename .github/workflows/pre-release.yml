name: Create GitHub Pre-Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

concurrency:
  group: release-${{ github.ref_name }} # allow concurrent prerelease from different branches
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1
  RUST_TOOLCHAIN: nightly-2025-12-04

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      new_version: ${{ steps.version.outputs.new_version }}
      branch_suffix: ${{ steps.branch.outputs.suffix }}
    steps:
      - name: Cache cargo-edit
        uses: actions/cache@v5
        id: cache-cargo-edit
        with:
          path: ~/.cargo/bin/cargo-set-version
          key: cargo-edit-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-edit
        if: steps.cache-cargo-edit.outputs.cache-hit != 'true'
        run: cargo install cargo-edit

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup node
        uses: ./.github/actions/setup-node

      - name: Generate branch suffix
        id: branch
        run: |
          branch_name="${{ github.ref_name }}"
          # Get last 6 characters of branch name, remove all special chars (including dashes)
          suffix=$(echo "$branch_name" | tail -c 7 | sed 's/[^a-zA-Z0-9]//g' | tr '[:upper:]' '[:lower:]')
          echo "Branch: $branch_name"
          echo "Suffix: $suffix"
          echo "suffix=$suffix" >> $GITHUB_OUTPUT

      - name: Determine and update versions
        id: version
        run: |
          # Always bump from the current package.json version.
          base_version=$(node -p "require('./package.json').version")
          echo "Base version from package.json: $base_version"

          timestamp=$(date +%Y%m%d%H%M%S)

          if [[ "${{ github.event.inputs.version_type }}" == "prerelease" ]]; then
            # For prerelease, start from the latest reachable base version.
            npm version $base_version --no-git-tag-version --allow-same-version
            npm version prerelease --preid="${{ steps.branch.outputs.suffix }}" --no-git-tag-version

            new_version=$(node -p "require('./package.json').version")
            new_tag="v${new_version}.${timestamp}"
          else
            # For regular releases, bump from latest reachable base version.
            npm version $base_version --no-git-tag-version --allow-same-version
            npm version ${{ github.event.inputs.version_type }} --no-git-tag-version

            new_version=$(node -p "require('./package.json').version")
            new_tag="v${new_version}-${timestamp}"
          fi

          # Update npx-cli package.json to match
          cd npx-cli
          npm version $new_version --no-git-tag-version --allow-same-version
          cd ..

          # Update frontend package.json to match
          cd frontend
          npm version $new_version --no-git-tag-version --allow-same-version
          cd ..

          cargo set-version --workspace "$new_version"

          echo "New version: $new_version"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Commit changes and create tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json pnpm-lock.yaml npx-cli/package.json frontend/package.json Cargo.lock
          git add $(find . -name Cargo.toml)
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag -a ${{ steps.version.outputs.new_tag }} -m "Release ${{ steps.version.outputs.new_tag }}"
          git push
          git push --tags

  build-frontend:
    needs: bump-version
    runs-on: ubuntu-latest
    env:
      VITE_PUBLIC_REACT_VIRTUOSO_LICENSE_KEY: ${{ secrets.PUBLIC_REACT_VIRTUOSO_LICENSE_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Type check frontend
        run: cd frontend && npx tsc --noEmit

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-backend:
    needs: [bump-version, build-frontend]
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
      HAS_APP_STORE_KEY: ${{ secrets.APP_STORE_API_KEY != '' }}
    strategy:
      # Platform matrix - keep target/name in sync with package-npx-cli job
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            container: &zigbuild_container ghcr.io/rust-cross/cargo-zigbuild@sha256:af1bc2b869c5d76c1300f7a4685c2f1793d068e6e895c9f5c399b517b31a731e
            name: linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x64
          # Intel-only runner; last supported x86_64 image (EOL Aug 2027)
          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: macos-x64
          - target: aarch64-apple-darwin
            os: macos-14
            name: macos-arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install libclang (Linux)
        if: runner.os == 'Linux'
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y clang libclang-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "cache-v1.0"
          key: ${{ matrix.target }}_${{ matrix.os }}
          cache-on-failure: true
          shared-key: "shared-${{ matrix.target }}"
          cache-all-crates: true

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Build backend (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} -p server

      - name: Build backend (non-Linux)
        if: runner.os != 'Linux'
        run: |
          cargo build --release --target ${{ matrix.target }} -p server

      - name: Prepare binaries (non-macOS)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/server.exe dist/vibe-kanban-${{ matrix.name }}.exe
          else
            cp target/${{ matrix.target }}/release/server dist/vibe-kanban-${{ matrix.name }}
          fi

      # Code signing for macOS only
      - name: Prepare Apple certificate (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}" | base64 --decode > certificate.p12

      - name: Write API Key to file
        if: runner.os == 'macOS' && env.HAS_APP_STORE_KEY == 'true'
        env:
          API_KEY: ${{ secrets.APP_STORE_API_KEY }}
        run: echo $API_KEY > app_store_key.json

      - name: Sign main binary (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: target/${{ matrix.target }}/release/server
          output_path: vibe-kanban
          p12_file: certificate.p12
          p12_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          sign: true
          sign_args: "--code-signature-flags=runtime"

      - name: Package main binary (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        run: zip vibe-kanban.zip vibe-kanban

      - name: Notarize signed binary (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true' && env.HAS_APP_STORE_KEY == 'true'
        uses: indygreg/apple-code-sign-action@v1
        continue-on-error: true
        with:
          input_path: vibe-kanban.zip
          sign: false
          notarize: true
          app_store_connect_api_key_json_file: app_store_key.json

      - name: Prepare signed binaries (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        run: |
          mkdir -p dist
          cp vibe-kanban.zip dist/vibe-kanban-${{ matrix.name }}.zip

      - name: Prepare unsigned binaries (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT != 'true'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/server vibe-kanban
          zip dist/vibe-kanban-${{ matrix.name }}.zip vibe-kanban

      - name: Clean up certificates (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        run: |
          rm -f certificate.p12
          rm -rf private_keys/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary-${{ matrix.name }}
          path: dist/
          retention-days: 1

  package-npx-cli:
    needs: [bump-version, build-frontend, build-backend]
    runs-on: ubuntu-latest
    strategy:
      # NOTE: This matrix must be kept in sync with build-backend job above
      # GitHub Actions doesn't support YAML anchors, so duplication is unavoidable
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            name: linux-x64
            binary: vibe-kanban
          - target: x86_64-pc-windows-msvc
            name: windows-x64
            binary: vibe-kanban.exe
          - target: x86_64-apple-darwin
            name: macos-x64
            binary: vibe-kanban
          - target: aarch64-apple-darwin
            name: macos-arm64
            binary: vibe-kanban
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download backend binary artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-binary-${{ matrix.name }}
          path: dist/

      - name: List downloaded artifacts
        run: |
          echo "Downloaded backend binaries:"
          find dist/

      - name: Create platform package
        if: matrix.name != 'macos-arm64' && matrix.name != 'macos-x64'
        run: |
          mkdir -p npx-cli/dist/${{ matrix.name }}
          mkdir vibe-kanban-${{ matrix.name }}

          cp dist/vibe-kanban-${{ matrix.name }}* vibe-kanban-${{ matrix.name }}/${{ matrix.binary }}

          zip -j npx-cli/dist/${{ matrix.name }}/vibe-kanban.zip vibe-kanban-${{ matrix.name }}/${{ matrix.binary }}

      - name: Create platform package (macOS)
        if: matrix.name == 'macos-arm64' || matrix.name == 'macos-x64'
        run: |
          mkdir -p npx-cli/dist/${{ matrix.name }}
          mkdir vibe-kanban-${{ matrix.name }}
          cp dist/vibe-kanban-${{ matrix.name }}* npx-cli/dist/${{ matrix.name }}/vibe-kanban.zip

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npx-platform-${{ matrix.name }}
          path: npx-cli/dist/
          retention-days: 1

  package-electron:
    needs: [bump-version, build-frontend, package-npx-cli]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            release_binary: vibe-kanban
            platform_dir: linux-x64
            builder_args: --linux
          - name: windows-x64
            os: windows-latest
            release_binary: vibe-kanban.exe
            platform_dir: windows-x64
            builder_args: --win
          - name: macos-arm64
            os: macos-14
            release_binary: vibe-kanban
            platform_dir: macos-arm64
            builder_args: --mac --arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Cache electron-builder downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download packaged CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: npx-platform-${{ matrix.platform_dir }}
          path: binaries/

      - name: Extract backend binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/release | Out-Null
          Expand-Archive -Path "binaries/${{ matrix.platform_dir }}/vibe-kanban.zip" -DestinationPath target/release -Force
          Move-Item -Path "target/release/${{ matrix.release_binary }}" -Destination "target/release/server.exe" -Force
          Get-ChildItem target/release

      - name: Extract backend binary (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p target/release
          unzip -o "binaries/${{ matrix.platform_dir }}/vibe-kanban.zip" -d target/release
          mv "target/release/${{ matrix.release_binary }}" target/release/server
          chmod +x target/release/server
          ls -la target/release

      - name: Build Electron package
        run: pnpm run build:electron ${{ matrix.builder_args }}
        env:
          SKIP_FRONTEND_BUILD: "1"
          SKIP_RUST_BUILD: "1"

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-platform-${{ matrix.name }}
          path: dist-electron/
          retention-days: 1

  create-prerelease:
    needs: [bump-version, build-frontend, package-npx-cli, package-electron]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: List downloaded artifacts
        run: |
          echo "Frontend dist:"
          find frontend/dist

      - name: Download all platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: npx-platform-*
          path: binaries/
          merge-multiple: true

      - name: Download Electron packages
        uses: actions/download-artifact@v4
        with:
          pattern: electron-platform-*
          path: electron-binaries/
          merge-multiple: true

      - name: List downloaded binary packages
        run: |
          echo "Downloaded binary zips:"
          find binaries/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for platform in linux-x64 windows-x64 macos-x64 macos-arm64; do
            cp "binaries/$platform/vibe-kanban.zip" "release-assets/npx-vk-bins-$platform.zip"
          done
          find electron-binaries -maxdepth 1 -type f -exec cp {} release-assets/ \;

      - name: Zip frontend
        run: |
          mkdir vibe-kanban-${{ needs.bump-version.outputs.new_tag }}
          mv frontend/dist vibe-kanban-${{ needs.bump-version.outputs.new_tag }}
          zip -r vibe-kanban-${{ needs.bump-version.outputs.new_tag }}.zip vibe-kanban-${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node for npm pack
        uses: ./.github/actions/setup-node

      - name: Pack npx-cli
        run: |
          cd npx-cli
          npm pack

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          name: Pre-release ${{ needs.bump-version.outputs.new_tag }}
          prerelease: true
          generate_release_notes: true
          files: |
            release-assets/npx-vk-bins-*.zip
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.exe
            release-assets/*.dmg
            npx-cli/vibe-kanban-*.tgz
